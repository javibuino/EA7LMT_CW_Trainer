<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#141c0d"/>
      <stop offset="55%" stop-color="#0a0d08"/>
      <stop offset="100%" stop-color="#050603"/>
    </radialGradient>
    <filter id="glowGreen" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowPurple" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowYellow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="512" height="512" rx="108" fill="url(#bgGrad)"/>
  <rect x="4" y="4" width="504" height="504" rx="104" fill="none" stroke="#1a2a14" stroke-width="3"/>

  <!-- purple ring, echoing the app's mode-switch accent color -->
  <circle cx="256" cy="256" r="192" fill="none" stroke="#b400e0" stroke-width="5" opacity="0.85" filter="url(#glowPurple)"/>

  <!-- morse glyph: dit + dah, in the app's signature neon green -->
  <g filter="url(#glowGreen)">
    <circle cx="172" cy="256" r="36" fill="#39ff14"/>
    <rect x="234" y="224" width="146" height="64" rx="32" fill="#39ff14"/>
  </g>

  <!-- yellow accent, echoing the confirmed-letter color -->
  <circle cx="382" cy="382" r="15" fill="#e8d000" filter="url(#glowYellow)"/>
</svg>
